# Rosentic — The agent output pipeline
# Catches semantic conflicts between AI coding agents before they break main.

name: Rosentic Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  rosentic-scan:
    name: Rosentic — Conflict Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up local branches
        run: |
          git fetch --all
          for b in $(git branch -r | grep -v HEAD | grep -v '/main$' | sed 's|origin/||'); do
            git branch --track "$b" "origin/$b" 2>/dev/null || true
          done

      - name: Restore Rosentic cache
        uses: actions/cache@v4
        with:
          path: .rosentic/
          key: rosentic-${{ github.repository }}-${{ github.sha }}
          restore-keys: rosentic-${{ github.repository }}-

      - name: Rosentic Scan
        uses: docker://ghcr.io/rosentic/rosentic-engine:latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
